<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TnyThinker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">
<style>
    :root {
        --bg-main: #131314;
        --bg-sidebar: #1e1f20;
        --bg-input: #1e1f20;
        --bg-user-bubble: #333537;
        --text-primary: #e3e3e3;
        --text-secondary: #c4c7c5;
        --border-color: #444746;
        --accent: #a8c7fa;
        --danger: #f28b82;
        --success: #81c995;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        font-family: "Chakra Petch", sans-serif;
        background: var(--bg-main);
        color: var(--text-primary);
        height: 100vh;
        overflow: hidden;
        display: flex;
        font-size: 16px;
        -webkit-font-smoothing: antialiased;
    }

    /* ==================== TOP BAR ==================== */
    #topbar {
        position: fixed;
        top: 0; left: 0; right: 0;
        height: 64px;
        background: rgb(75 75 75 / 41%);
        backdrop-filter: blur(10px);
        display: flex;
        align-items: center;
        padding: 0 16px;
        gap: 8px;
        z-index: 1000;
    }

    .icon-btn {
        background: transparent;
        border: none;
        color: var(--text-secondary);
        cursor: pointer;
        padding: 10px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.2s, color 0.2s;
        font-family: inherit;
    }
    .icon-btn:hover { background: rgba(255,255,255,0.08); color: var(--text-primary); }
    .icon-btn svg { width: 20px; height: 20px; fill: currentColor; pointer-events: none; }

    .app-title {
        font-size: 18px;
        font-weight: 500;
        margin-left: 4px;
        color: var(--text-secondary);
        flex: 1;
    }

    #conv-actions { display: none; align-items: center; gap: 4px; }
    #conv-actions.visible { display: flex; }

    .action-btn {
        background: transparent;
        border: 1px solid var(--border-color);
        color: var(--text-secondary);
        cursor: pointer;
        padding: 6px 14px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 500;
        display: flex;
        align-items: center;
        gap: 6px;
        transition: all 0.2s;
        font-family: inherit;
        white-space: nowrap;
    }
    .action-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(168,199,250,0.06); }
    .action-btn svg { width: 14px; height: 14px; fill: currentColor; }
    .action-btn.export-btn:hover { border-color: var(--success); color: var(--success); background: rgba(129,201,149,0.06); }

    /* ==================== SIDEBAR ==================== */
    #sidebar {
        width: 260px;
        background: var(--bg-sidebar);
        padding: 80px 12px 20px;
        display: flex;
        flex-direction: column;
        gap: 4px;
        transition: width 0.3s ease, padding 0.3s ease;
        flex-shrink: 0;
        overflow: hidden;
        white-space: nowrap;
        z-index: 900;
    }
    #sidebar.collapsed { width: 0; padding-left: 0; padding-right: 0; }

    .new-chat {
        background: transparent;
        border: none;
        color: var(--text-primary);
        padding: 12px 16px;
        border-radius: 24px;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 12px;
        transition: background 0.2s;
        font-family: inherit;
        flex-shrink: 0;
        margin-bottom: 8px;
    }
    .new-chat:hover { background: rgba(255,255,255,0.08); }

    .sidebar-section-label {
        font-size: 11px;
        font-weight: 600;
        color: var(--text-secondary);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        padding: 4px 16px;
        margin-top: 4px;
        flex-shrink: 0;
    }

    #history-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 2px; }
    #history-list::-webkit-scrollbar { width: 4px; }
    #history-list::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 2px; }

    .history-item {
        position: relative;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 12px;
        border-radius: 12px;
        cursor: pointer;
        transition: background 0.15s;
    }
    .history-item:hover { background: rgba(255,255,255,0.07); }
    .history-item.active { background: rgba(168,199,250,0.12); }

    .history-item-title {
        flex: 1;
        font-size: 13px;
        color: var(--text-secondary);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
    }
    .history-item.active .history-item-title { color: var(--accent); }

    .history-item-actions { display: none; align-items: center; gap: 2px; flex-shrink: 0; }
    .history-item:hover .history-item-actions { display: flex; }

    .hist-btn {
        background: transparent; border: none;
        color: var(--text-secondary); cursor: pointer;
        padding: 3px; border-radius: 5px;
        display: flex; align-items: center;
        transition: color 0.15s, background 0.15s;
        font-family: inherit;
    }
    .hist-btn svg { width: 13px; height: 13px; fill: currentColor; }
    .hist-btn.del:hover { color: var(--danger); background: rgba(242,139,130,0.1); }
    .hist-btn.ren:hover { color: var(--accent); background: rgba(168,199,250,0.1); }

    .history-empty {
        font-size: 12px; color: var(--border-color);
        text-align: center; padding: 24px 8px; font-style: italic;
    }

    /* ==================== MAIN & CHAT ==================== */
    #main { flex: 1; display: flex; flex-direction: column; position: relative; height: 100vh; }

    #chat { flex: 1; overflow-y: auto; padding: 80px 20px 140px; scroll-behavior: smooth; }
    #chat::-webkit-scrollbar { width: 8px; }
    #chat::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }

    /* ==================== MENSAGENS ==================== */
    .message-wrapper {
        max-width: 800px;
        margin: 0 auto 32px auto;
        display: flex;
        gap: 16px;
        line-height: 1.6;
        position: relative;
    }
    .user-wrapper { justify-content: flex-end; }
    .bot-wrapper  { justify-content: flex-start; }

    .bot-icon { width: 32px; height: 32px; display: flex; align-items: flex-start; justify-content: center; flex-shrink: 0; margin-top: 4px; }
    .bot-icon svg { width: 24px; height: 24px; fill: var(--accent); }

    .message-content { max-width: 85%; position: relative; }

    .bot-message {
        background: var(--bg-sidebar); color: var(--text-primary);
        padding: 12px 20px; border-radius: 4px 24px 24px 24px;
        border: 1px solid rgba(255,255,255,0.05);
        display: inline-block; white-space: pre-wrap; word-break: break-word;
    }
    .user-message {
        background: var(--bg-user-bubble); color: var(--text-primary);
        padding: 12px 20px; border-radius: 24px 4px 24px 24px;
        display: inline-block; white-space: pre-wrap; word-break: break-word;
    }

    /* toolbar hover */
    .msg-toolbar {
        display: none; gap: 4px; z-index: 10;
        padding-top: 6px;
    }
    .user-wrapper .msg-toolbar { justify-content: flex-end; }
    .message-content:hover .msg-toolbar { display: flex; }

    .msg-tool-btn {
        background: var(--bg-sidebar);
        border: 1px solid var(--border-color);
        color: var(--text-secondary);
        cursor: pointer; padding: 3px 9px; border-radius: 8px;
        font-size: 11px; display: flex; align-items: center; gap: 4px;
        transition: all 0.15s; font-family: inherit; white-space: nowrap;
    }
    .msg-tool-btn:hover { color: var(--accent); border-color: var(--accent); background: rgba(168,199,250,0.08); }
    .msg-tool-btn.del-msg:hover { color: var(--danger); border-color: var(--danger); background: rgba(242,139,130,0.08); }
    .msg-tool-btn svg { width: 11px; height: 11px; fill: currentColor; }

    /* edit mode */
    .message-edit-area {
        width: 100%; min-width: 260px;
        background: var(--bg-main); border: 1px solid var(--accent);
        border-radius: 12px; color: var(--text-primary);
        font-size: 14px; font-family: inherit;
        padding: 10px 14px; resize: vertical; outline: none; line-height: 1.6;
    }
    .edit-actions { display: flex; gap: 6px; margin-top: 6px; }
    .edit-save {
        background: var(--accent); color: #131314; border: none;
        padding: 5px 14px; border-radius: 10px; font-size: 12px;
        font-weight: 600; cursor: pointer; font-family: inherit; transition: opacity 0.15s;
    }
    .edit-save:hover { opacity: 0.85; }
    .edit-cancel {
        background: transparent; color: var(--text-secondary);
        border: 1px solid var(--border-color);
        padding: 5px 14px; border-radius: 10px; font-size: 12px;
        cursor: pointer; font-family: inherit; transition: all 0.15s;
    }
    .edit-cancel:hover { border-color: var(--text-secondary); color: var(--text-primary); }

    /* ==================== INPUT AREA ==================== */
    #inputArea {
        position: absolute; bottom: 0; left: 0; right: 0; padding: 20px;
        background: linear-gradient(to top, var(--bg-main) 80%, transparent);
        display: flex; justify-content: center;
    }
    #inputBox {
        display: flex; align-items: flex-end;
        background: var(--bg-input); border: 1px solid var(--border-color);
        border-radius: 32px; padding: 8px 8px 8px 24px;
        width: 100%; max-width: 800px; transition: background 0.2s;
    }
    #inputBox:focus-within { background: rgba(255,255,255,0.05); }
    #input {
        flex: 1; background: transparent; border: none; outline: none;
        color: var(--text-primary); font-size: 16px; padding: 12px 0;
        max-height: 200px; resize: none; font-family: inherit;
    }
    #input::placeholder { color: var(--text-secondary); }
    #sendBtn {
        background: transparent; color: var(--text-secondary); border: none;
        width: 40px; height: 40px; border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        cursor: pointer; transition: all 0.2s; flex-shrink: 0; margin-left: 8px;
    }
    #sendBtn:hover { background: rgba(255,255,255,0.08); color: var(--text-primary); }
    #sendBtn svg { width: 20px; height: 20px; fill: currentColor; }

    .typing::after { content: '●'; animation: blink 1s step-start infinite; color: var(--text-secondary); margin-left: 4px; font-size: 12px; }
    @keyframes blink { 50% { opacity: 0; } }

    /* ==================== TOAST ==================== */
    #toast {
        position: fixed; bottom: 100px; left: 50%;
        transform: translateX(-50%) translateY(20px);
        background: var(--bg-sidebar); border: 1px solid var(--border-color);
        color: var(--text-primary); padding: 10px 20px; border-radius: 20px;
        font-size: 13px; opacity: 0; transition: opacity 0.2s, transform 0.2s;
        pointer-events: none; z-index: 9999;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ==================== MODAL ==================== */
    #modal-overlay {
        display: none; position: fixed; inset: 0;
        background: rgba(0,0,0,0.6); z-index: 2000;
        align-items: center; justify-content: center;
    }
    #modal-box {
        background: var(--bg-sidebar); border: 1px solid var(--border-color);
        border-radius: 20px; padding: 24px; width: 480px; max-width: 90vw;
        display: flex; flex-direction: column; gap: 16px;
    }
    .modal-title { font-size: 15px; font-weight: 600; }
    .modal-label { font-size: 12px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 6px; display: block; }
    .role-row { display: flex; gap: 8px; }
    .role-btn {
        flex: 1; padding: 8px; border-radius: 10px;
        border: 1px solid var(--border-color); background: transparent;
        color: var(--text-secondary); font-family: inherit; font-size: 13px; cursor: pointer;
        transition: all 0.15s;
    }
    .role-btn.selected { border-color: var(--accent); background: rgba(168,199,250,0.12); color: var(--accent); }
    #modal-text {
        width: 100%; background: var(--bg-main); border: 1px solid var(--border-color);
        border-radius: 12px; color: var(--text-primary); font-family: inherit;
        font-size: 14px; padding: 10px 14px; resize: vertical; outline: none; line-height: 1.6;
    }
    #modal-text:focus { border-color: var(--accent); }
    .modal-footer { display: flex; gap: 8px; justify-content: flex-end; }
    .btn-cancel {
        background: transparent; border: 1px solid var(--border-color);
        color: var(--text-secondary); padding: 8px 18px; border-radius: 12px;
        font-family: inherit; font-size: 13px; cursor: pointer; transition: all 0.15s;
    }
    .btn-cancel:hover { border-color: var(--text-secondary); color: var(--text-primary); }
    .btn-confirm {
        background: var(--accent); border: none; color: #131314;
        padding: 8px 18px; border-radius: 12px; font-family: inherit;
        font-size: 13px; font-weight: 600; cursor: pointer; transition: opacity 0.15s;
    }
    .btn-confirm:hover { opacity: 0.85; }

    @media (max-width: 768px) {
        #sidebar { position: absolute; height: 100%; }
        .message-wrapper { max-width: 100%; }
        .message-content { max-width: 90%; }
        #conv-actions .action-btn span { display: none; }
    }

    /* Isso funciona na maioria dos navegadores desktop */
    #modelSelect option {
        background-color: #2d2d2d;
        color: #ffffff;
        padding: 10px; 
        border: none;
        border-radius: 15px;
    }

    /* Estilo para quando o mouse passa por cima (suporte limitado) */
    #modelSelect option:hover {
        background-color: #4a90e2;
    }
</style>
</head>
<body>

<div id="topbar">
    <button class="icon-btn" onclick="toggleSidebar()" aria-label="Menu">
        <svg viewBox="0 0 24 24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
    </button>
    <div class="app-title">TnyThinker</div>

    <div id="conv-actions">
        <button class="action-btn" onclick="addManualMessage()">
            <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
            <span>Adicionar turno</span>
        </button>
        <button class="action-btn export-btn" onclick="exportTxt()">
            <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zm-8 2V5h2v6h1.17L12 13.17 9.83 11H11zm-6 7h14v2H5z"/></svg>
            <span>Exportar .txt</span>
        </button>
    </div>
    <div style="margin-left: 15px;">
    <select id="modelSelect" class="action-btn" onchange="changeModel(this.value)">
        <option>Carregando modelos...</option>
    </select>
</div>
</div>

<div id="sidebar">
    <button class="new-chat" onclick="startNewChat()">
        <svg style="width:20px;height:20px;fill:currentColor" viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
        Novo chat
    </button>
    <div class="sidebar-section-label">Histórico</div>
    <div id="history-list"><div class="history-empty">Nenhuma conversa ainda</div></div>
</div>

<div id="main">
    <div id="chat"></div>
    <div id="inputArea">
        <div id="inputBox">
            <input id="input" placeholder="Digite sua mensagem aqui..."
                   autocomplete="off" onkeydown="if(event.key==='Enter') send()">
            <button id="sendBtn" onclick="send()">
                <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
        </div>
    </div>
</div>

<div id="toast"></div>

<!-- MODAL -->
<div id="modal-overlay">
    <div id="modal-box">
        <div class="modal-title">Adicionar turno manualmente</div>
        <div>
            <span class="modal-label">Papel</span>
            <div class="role-row">
                <button id="role-user" class="role-btn selected" onclick="setRole('user')">usuário</button>
                <button id="role-assistant" class="role-btn" onclick="setRole('assistant')">assistente</button>
            </div>
        </div>
        <div>
            <span class="modal-label">Mensagem</span>
            <textarea id="modal-text" rows="4" placeholder="Digite o conteúdo..."></textarea>
        </div>
        <div class="modal-footer">
            <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
            <button class="btn-confirm" onclick="confirmAddTurn()">Adicionar</button>
        </div>
    </div>
</div>

<script>
const API = "";
const sidebar     = document.getElementById("sidebar");
const chat        = document.getElementById("chat");
const historyList = document.getElementById("history-list");
const convActions = document.getElementById("conv-actions");

let sidebarOpen   = true;
let currentConvId = null;
let modalRole     = "user";

// ─── icons ────────────────────────────────────────────────
const aiIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="3"/>
    <path d="M12 2v7"/><path d="M12 15v7"/>
    <path d="M22 12h-7"/><path d="M9 12H2"/>
    <path d="m19.07 4.93-4.95 4.95"/><path d="m9.88 14.12-4.95 4.95"/>
    <path d="m4.93 4.93 4.95 4.95"/><path d="m14.12 14.12 4.95 4.95"/>
</svg>`;
const iEdit   = `<svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a1 1 0 0 0 0-1.41l-2.34-2.34a1 1 0 0 0-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>`;
const iDelete = `<svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>`;

// ─── utils ────────────────────────────────────────────────
function escHtml(s) {
    return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
function unescHtml(s) {
    return s.replace(/&amp;/g,"&").replace(/&lt;/g,"<").replace(/&gt;/g,">").replace(/&quot;/g,'"');
}
function toast(msg, ms = 2400) {
    const el = document.getElementById("toast");
    el.textContent = msg;
    el.classList.add("show");
    setTimeout(() => el.classList.remove("show"), ms);
}
function scrollToBottom() { chat.scrollTo({ top: chat.scrollHeight, behavior: "smooth" }); }

function setConvActive(id) {
    currentConvId = id;
    convActions.classList.toggle("visible", !!id);
    document.querySelectorAll(".history-item").forEach(el =>
        el.classList.toggle("active", el.dataset.id === id));
}

function makeMsgToolbar() {
    return `<div class="msg-toolbar">
        <button class="msg-tool-btn" onclick="editMessage(this)">${iEdit} Editar</button>
        <button class="msg-tool-btn del-msg" onclick="deleteMessage(this)">${iDelete} Deletar</button>
    </div>`;
}

// ─── sidebar ──────────────────────────────────────────────
function toggleSidebar() {
    sidebarOpen = !sidebarOpen;
    sidebar.classList.toggle("collapsed", !sidebarOpen);
}

// ─── histórico ────────────────────────────────────────────
async function loadHistory() {
    try {
        const res = await fetch(`${API}/conversations`);
        renderHistory(await res.json());
    } catch(e) {}
}

function renderHistory(convs) {
    if (!convs.length) {
        historyList.innerHTML = '<div class="history-empty">Nenhuma conversa ainda</div>';
        return;
    }
    historyList.innerHTML = "";
    for (const c of convs) {
        const item = document.createElement("div");
        item.className = "history-item" + (c.id === currentConvId ? " active" : "");
        item.dataset.id = c.id;
        item.innerHTML = `
            <span class="history-item-title" title="${escHtml(c.title)}">${escHtml(c.title)}</span>
            <div class="history-item-actions">
                <button class="hist-btn ren" title="Renomear" onclick="renameConv(event,'${c.id}','${escHtml(c.title)}')">${iEdit}</button>
                <button class="hist-btn del" title="Deletar"  onclick="deleteConv(event,'${c.id}')">${iDelete}</button>
            </div>`;
        item.addEventListener("click", e => { if (!e.target.closest(".hist-btn")) loadConversation(c.id); });
        historyList.appendChild(item);
    }
}

async function loadConversation(convId) {
    try {
        const res  = await fetch(`${API}/conversations/${convId}`);
        const data = await res.json();
        chat.innerHTML = "";
        for (const m of data.messages)
            addMessage(m.content, m.role === "user" ? "user" : "bot", false, m.id);
        setConvActive(convId);
        scrollToBottom();
        document.getElementById("input").focus();
    } catch(e) { console.error(e); }
}

async function deleteConv(e, id) {
    e.stopPropagation();
    if (!confirm("Deletar esta conversa?")) return;
    await fetch(`${API}/conversations/${id}`, { method: "DELETE" });
    if (currentConvId === id) { currentConvId = null; chat.innerHTML = ""; convActions.classList.remove("visible"); }
    loadHistory();
}

async function renameConv(e, id, old) {
    e.stopPropagation();
    const t = prompt("Novo título:", unescHtml(old));
    if (!t || t.trim() === unescHtml(old)) return;
    await fetch(`${API}/conversations/${id}/rename`, {
        method: "PATCH",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ title: t.trim() })
    });
    loadHistory();
}

function startNewChat() {
    currentConvId = null; chat.innerHTML = "";
    convActions.classList.remove("visible");
    document.querySelectorAll(".history-item").forEach(el => el.classList.remove("active"));
    document.getElementById("input").focus();
}

// ─── mensagens ────────────────────────────────────────────
function addMessage(text, type, scroll = true, msgId = null) {
    const wrapper = document.createElement("div");
    wrapper.className = `message-wrapper ${type}-wrapper`;
    if (msgId) wrapper.dataset.msgId = String(msgId);

    const cls = type === "bot" ? "bot-message" : "user-message";

    if (type === "bot") {
        wrapper.innerHTML = `
            <div class="bot-icon">${aiIcon}</div>
            <div class="message-content">
                <div class="message ${cls}">${escHtml(text)}</div>
                ${makeMsgToolbar()}
            </div>`;
    } else {
        wrapper.innerHTML = `
            <div class="message-content">
                <div class="message ${cls}">${escHtml(text)}</div>
                ${makeMsgToolbar()}
            </div>`;
    }

    chat.appendChild(wrapper);
    if (scroll) scrollToBottom();
    return wrapper;
}

async function loadModelsList() {
    const res = await fetch(`${API}/models`);
    const models = await res.json();
    const select = document.getElementById("modelSelect");
    select.innerHTML = models.map(m => `<option value="${m}">${m}</option>`).join('');
}

async function changeModel(modelName) {
    toast("⏳ Carregando modelo...");
    const res = await fetch(`${API}/select-model`, {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ model_name: modelName })
    });
    if(res.ok) toast("✅ Modelo pronto!");
    else toast("❌ Erro ao trocar modelo");
}

// Chame loadModelsList() dentro do window.onload

// ─── edição inline ────────────────────────────────────────
function editMessage(btn) {
    const content  = btn.closest(".message-content");
    const bubble   = content.querySelector(".message");
    const original = bubble.textContent;

    // guarda o texto original num data-attr para não depender de onclick inline
    content.dataset.original = original;

    content.innerHTML = `
        <textarea class="message-edit-area"></textarea>
        <div class="edit-actions">
            <button class="edit-save"   onclick="saveEdit(this)">Salvar</button>
            <button class="edit-cancel" onclick="cancelEdit(this)">Cancelar</button>
        </div>`;

    const ta = content.querySelector("textarea");
    ta.value = original;
    ta.focus();
    ta.setSelectionRange(ta.value.length, ta.value.length);
}

async function saveEdit(btn) {
    const content = btn.closest(".message-content");
    const wrapper = content.closest(".message-wrapper");
    const ta      = content.querySelector("textarea");
    const newText = ta.value.trim();
    if (!newText) return;

    const msgId = wrapper.dataset.msgId;
    const cls   = wrapper.classList.contains("user-wrapper") ? "user-message" : "bot-message";

    if (!msgId) {
        toast("⚠️ Mensagem sem ID — reabra a conversa para editar");
        content.innerHTML = `<div class="message ${cls}">${escHtml(newText)}</div>${makeMsgToolbar()}`;
        return;
    }

    btn.textContent = "Salvando...";
    btn.disabled = true;

    try {
        const res = await fetch(`${API}/messages/${msgId}`, {
            method: "PATCH",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({ content: newText })
        });
        if (!res.ok) throw new Error(await res.text());
        content.innerHTML = `<div class="message ${cls}">${escHtml(newText)}</div>${makeMsgToolbar()}`;
        toast("✏️ Mensagem editada");
    } catch(e) {
        toast("❌ Erro ao salvar: " + e.message);
        btn.textContent = "Salvar";
        btn.disabled = false;
    }
}

function cancelEdit(btn) {
    const content  = btn.closest(".message-content");
    const wrapper  = content.closest(".message-wrapper");
    const original = content.dataset.original || "";
    const cls = wrapper.classList.contains("user-wrapper") ? "user-message" : "bot-message";
    content.innerHTML = `<div class="message ${cls}">${escHtml(original)}</div>${makeMsgToolbar()}`;
}

async function deleteMessage(btn) {
    if (!confirm("Deletar esta mensagem?")) return;
    const wrapper = btn.closest(".message-wrapper");
    const msgId   = wrapper.dataset.msgId;
    if (msgId && currentConvId) {
        try { await fetch(`${API}/messages/${msgId}`, { method: "DELETE" }); } catch(e) {}
    }
    wrapper.remove();
    toast("🗑️ Mensagem removida");
}

// ─── adicionar turno manual ───────────────────────────────
function addManualMessage() {
    if (!currentConvId) { toast("Abra uma conversa primeiro"); return; }
    document.getElementById("modal-overlay").style.display = "flex";
    document.getElementById("modal-text").value = "";
    setRole("user");
    setTimeout(() => document.getElementById("modal-text").focus(), 80);
}

function setRole(role) {
    modalRole = role;
    document.getElementById("role-user").classList.toggle("selected", role === "user");
    document.getElementById("role-assistant").classList.toggle("selected", role === "assistant");
}

function closeModal() { document.getElementById("modal-overlay").style.display = "none"; }

async function confirmAddTurn() {
    const text = document.getElementById("modal-text").value.trim();
    if (!text) return;

    const type = modalRole === "user" ? "user" : "bot";
    let msgId  = null;

    try {
        const res = await fetch(`${API}/conversations/${currentConvId}/messages`, {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({ role: modalRole, content: text })
        });
        const data = await res.json();
        msgId = data.id;
    } catch(e) {}

    addMessage(text, type, true, msgId);
    toast("✅ Turno adicionado");
    closeModal();
}

// ─── exportar .txt ────────────────────────────────────────
async function exportTxt() {
    if (!currentConvId) { toast("Abra uma conversa primeiro"); return; }

    let messages = [];

    // Prioridade: banco de dados
    try {
        const res  = await fetch(`${API}/conversations/${currentConvId}`);
        const data = await res.json();
        messages   = data.messages;
    } catch(e) {
        // fallback: lê da tela
        chat.querySelectorAll(".message-wrapper").forEach(w => {
            const bubble = w.querySelector(".message");
            if (!bubble) return;
            messages.push({
                role:    w.classList.contains("user-wrapper") ? "user" : "assistant",
                content: bubble.textContent
            });
        });
    }

    if (!messages.length) { toast("Conversa vazia"); return; }

    const lines = messages.map(m => {
        const role = m.role === "user" ? "usuário" : "assistente";
        return `${role}: ${m.content}`;
    });

    const blob = new Blob([lines.join("\n")], { type: "text/plain;charset=utf-8" });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href     = url;

    const titleEl = document.querySelector(".history-item.active .history-item-title");
    const name    = (titleEl ? titleEl.textContent : "conversa")
        .replace(/[^\w\s\-çãõáéíóúàâêîôûü]/gi, "").trim() || "conversa";
    a.download    = `${name}.txt`;

    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    toast("📄 Exportado com sucesso!");
}

// ─── chat / send ──────────────────────────────────────────
async function send() {
    const input = document.getElementById("input");
    const text  = input.value.trim();
    if (!text) return;

    addMessage(text, "user");
    input.value = "";

    const botWrapper = document.createElement("div");
    botWrapper.className = "message-wrapper bot-wrapper";
    botWrapper.innerHTML = `
        <div class="bot-icon">${aiIcon}</div>
        <div class="message-content">
            <div class="message bot-message typing"></div>
        </div>`;
    chat.appendChild(botWrapper);
    scrollToBottom();

    const botMessage = botWrapper.querySelector(".bot-message");

    try {
        const res = await fetch(`${API}/chat-stream`, {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({ message: text, conversation_id: currentConvId })
        });

        const newConvId = res.headers.get("X-Conversation-Id");
        if (newConvId && !currentConvId) {
            currentConvId = newConvId;
            setConvActive(newConvId);
            setTimeout(loadHistory, 300);
        }

        const reader  = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "", full = "";
        botMessage.classList.remove("typing");

        while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            buffer += decoder.decode(value, { stream: true });
            const parts = buffer.split("\n\n");
            buffer = parts.pop() || "";
            for (const part of parts) {
                if (!part.startsWith("data: ")) continue;
                try {
                    const d = JSON.parse(part.slice(6));
                    if (d.token) { full += d.token; botMessage.textContent = full; scrollToBottom(); }
                } catch(e) {}
            }
        }

        // recarrega para obter IDs reais do banco
        if (currentConvId) setTimeout(() => loadConversation(currentConvId), 400);

    } catch(e) {
        botMessage.textContent = "Erro de conexão. Verifique se o servidor local está rodando.";
    }
    botMessage.classList.remove("typing");
}

// ─── init ─────────────────────────────────────────────────
window.onload = () => {
    document.getElementById("input").focus();
    if (window.innerWidth <= 768) toggleSidebar();
    loadHistory();
    loadModelsList();
    setInterval(loadHistory, 10000);
};
